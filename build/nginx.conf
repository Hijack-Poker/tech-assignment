server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Unity WebGL brotli-compressed files (specific types first)
    location ~ \.wasm\.br$ {
        add_header Content-Encoding br;
        default_type application/wasm;
    }

    location ~ \.js\.br$ {
        add_header Content-Encoding br;
        default_type application/javascript;
    }

    location ~ \.data\.br$ {
        add_header Content-Encoding br;
        default_type application/octet-stream;
    }

    location ~ \.br$ {
        add_header Content-Encoding br;
        default_type application/octet-stream;
    }

    # Unity WebGL gzip-compressed files (specific types first)
    location ~ \.wasm\.gz$ {
        add_header Content-Encoding gzip;
        default_type application/wasm;
    }

    location ~ \.js\.gz$ {
        add_header Content-Encoding gzip;
        default_type application/javascript;
    }

    location ~ \.data\.gz$ {
        add_header Content-Encoding gzip;
        default_type application/octet-stream;
    }

    location ~ \.gz$ {
        add_header Content-Encoding gzip;
        default_type application/octet-stream;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
