openapi: 3.0.3
info:
  title: Streaks API
  description: |
    Player engagement service for Hijack Poker. Tracks daily login and play
    streaks, awards milestone rewards, manages streak freezes, daily missions,
    and responsible-gaming controls.
  version: 1.0.0
  contact:
    name: Hijack Poker Engineering

servers:
  - url: http://localhost:5001
    description: Local development (serverless-offline)

tags:
  - name: Health
    description: Service health check
  - name: Player Streaks
    description: Core streak state and leaderboard
  - name: Calendar
    description: Monthly activity calendar heat-map data
  - name: Rewards
    description: Milestone reward history
  - name: Freezes
    description: Streak freeze balance and usage history
  - name: Missions
    description: Daily missions and claim flow
  - name: Responsible Gaming
    description: Session limits, hand limits, and self-exclusion
  - name: Admin
    description: Administrative and debug endpoints (no auth in MVP)
  - name: Internal
    description: Internal service-to-service endpoints (no auth)

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT issued by the auth service. The token payload must include a
        `playerId` claim. Pass via the Authorization header or the
        `X-Player-Id` header (development fallback).

  schemas:
    # ---------- Shared ----------
    Error:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    ErrorDetail:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message

    # ---------- Health ----------
    HealthResponse:
      type: object
      properties:
        service:
          type: string
          example: streaks-api
        status:
          type: string
          example: ok
        timestamp:
          type: string
          format: date-time
      required:
        - service
        - status
        - timestamp

    # ---------- Milestone ----------
    Milestone:
      type: object
      nullable: true
      properties:
        days:
          type: integer
          example: 7
        reward:
          type: integer
          example: 150
        daysRemaining:
          type: integer
          example: 4

    MilestoneReward:
      type: object
      nullable: true
      properties:
        playerId:
          type: string
        rewardId:
          type: string
          format: uuid
        type:
          type: string
          enum: [login_milestone, play_milestone]
        milestone:
          type: integer
        points:
          type: integer
        streakCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    # ---------- Check-in ----------
    CheckInResponse:
      type: object
      properties:
        playerId:
          type: string
        loginStreak:
          type: integer
        bestLoginStreak:
          type: integer
        todayCheckedIn:
          type: boolean
        milestone:
          $ref: "#/components/schemas/MilestoneReward"
      required:
        - playerId
        - loginStreak
        - bestLoginStreak
        - todayCheckedIn
        - milestone

    # ---------- Streaks ----------
    StreaksResponse:
      type: object
      properties:
        loginStreak:
          type: integer
        playStreak:
          type: integer
        bestLoginStreak:
          type: integer
        bestPlayStreak:
          type: integer
        freezesAvailable:
          type: integer
        nextLoginMilestone:
          $ref: "#/components/schemas/Milestone"
        nextPlayMilestone:
          $ref: "#/components/schemas/Milestone"
        lastLoginDate:
          type: string
          example: "2026-03-22"
        lastPlayDate:
          type: string
          example: "2026-03-21"
        comboActive:
          type: boolean
        comboMultiplier:
          type: number
          format: double
          example: 1.1
      required:
        - loginStreak
        - playStreak
        - bestLoginStreak
        - bestPlayStreak
        - freezesAvailable
        - nextLoginMilestone
        - nextPlayMilestone
        - lastLoginDate
        - lastPlayDate
        - comboActive
        - comboMultiplier

    # ---------- Leaderboard ----------
    LeaderboardEntry:
      type: object
      properties:
        rank:
          type: integer
        playerId:
          type: string
        displayName:
          type: string
        loginStreak:
          type: integer
        playStreak:
          type: integer
        bestLoginStreak:
          type: integer
        bestPlayStreak:
          type: integer
        score:
          type: integer
        tier:
          type: string
          enum: [bronze, silver, gold, platinum]

    PlayerRank:
      type: object
      nullable: true
      properties:
        rank:
          type: integer
        playerId:
          type: string
        displayName:
          type: string
        loginStreak:
          type: integer
        playStreak:
          type: integer
        score:
          type: integer
        tier:
          type: string
          enum: [bronze, silver, gold, platinum]

    LeaderboardResponse:
      type: object
      properties:
        leaderboard:
          type: array
          items:
            $ref: "#/components/schemas/LeaderboardEntry"
        playerRank:
          $ref: "#/components/schemas/PlayerRank"
      required:
        - leaderboard
        - playerRank

    # ---------- Calendar ----------
    CalendarDay:
      type: object
      properties:
        date:
          type: string
          example: "2026-03-01"
        activity:
          type: string
          enum: [freeze, played, login_only, streak_broken, none]
        loginStreak:
          type: integer
        playStreak:
          type: integer
      required:
        - date
        - activity
        - loginStreak
        - playStreak

    CalendarResponse:
      type: object
      properties:
        month:
          type: string
          example: "2026-03"
        days:
          type: array
          items:
            $ref: "#/components/schemas/CalendarDay"
      required:
        - month
        - days

    # ---------- Rewards ----------
    RewardEntry:
      type: object
      properties:
        date:
          type: string
          format: date-time
        milestone:
          type: integer
        type:
          type: string
          enum: [login_milestone, play_milestone]
        points:
          type: integer

    RewardsResponse:
      type: object
      properties:
        rewards:
          type: array
          items:
            $ref: "#/components/schemas/RewardEntry"
      required:
        - rewards

    # ---------- Freezes ----------
    FreezeHistoryEntry:
      type: object
      properties:
        date:
          type: string
        source:
          type: string

    FreezesResponse:
      type: object
      properties:
        freezesAvailable:
          type: integer
        freezesUsedThisMonth:
          type: integer
        history:
          type: array
          items:
            $ref: "#/components/schemas/FreezeHistoryEntry"
      required:
        - freezesAvailable
        - freezesUsedThisMonth
        - history

    # ---------- Missions ----------
    Mission:
      type: object
      properties:
        missionId:
          type: string
          example: check_in-2026-03-23
        id:
          type: string
          example: check_in
        title:
          type: string
          example: Daily Check-In
        description:
          type: string
        target:
          type: integer
        reward:
          type: integer
        type:
          type: string
          enum: [check_in, play_hands, login_streak, play_streak, combo_streak]
        progress:
          type: integer
        status:
          type: string
          enum: [active, completed, claimed]

    MissionsResponse:
      type: object
      properties:
        date:
          type: string
          example: "2026-03-23"
        missions:
          type: array
          items:
            $ref: "#/components/schemas/Mission"
        pointsEarnedToday:
          type: integer
      required:
        - date
        - missions
        - pointsEarnedToday

    MissionClaimResponse:
      type: object
      properties:
        reward:
          type: integer
        pointsEarnedToday:
          type: integer
      required:
        - reward
        - pointsEarnedToday

    # ---------- Responsible Gaming ----------
    ResponsibleGamingSettings:
      type: object
      properties:
        sessionLimitMinutes:
          type: integer
          nullable: true
          example: 60
        dailyHandLimit:
          type: integer
          nullable: true
          example: 100
        selfExcludedUntil:
          type: string
          format: date-time
          nullable: true
        reminderEnabled:
          type: boolean
        coolOffEnabled:
          type: boolean
      required:
        - sessionLimitMinutes
        - dailyHandLimit
        - selfExcludedUntil
        - reminderEnabled
        - coolOffEnabled

    ResponsibleGamingUpdateRequest:
      type: object
      properties:
        sessionLimitMinutes:
          type: integer
          nullable: true
          description: Between 15 and 1440, or null to disable
        dailyHandLimit:
          type: integer
          nullable: true
          description: Between 1 and 10000, or null to disable
        reminderEnabled:
          type: boolean

    ResponsibleGamingUpdateResponse:
      type: object
      properties:
        success:
          type: boolean
        updatedAt:
          type: string
          format: date-time
        sessionLimitMinutes:
          type: integer
          nullable: true
        dailyHandLimit:
          type: integer
          nullable: true
        reminderEnabled:
          type: boolean

    SelfExcludeRequest:
      type: object
      properties:
        days:
          type: integer
          minimum: 1
          maximum: 365
      required:
        - days

    SelfExcludeResponse:
      type: object
      properties:
        success:
          type: boolean
        selfExcludedUntil:
          type: string
          format: date-time
        message:
          type: string
      required:
        - success
        - selfExcludedUntil
        - message

    # ---------- Internal ----------
    HandCompletedRequest:
      type: object
      properties:
        playerId:
          type: string
        tableId:
          type: string
        handId:
          type: string
        completedAt:
          type: string
          format: date-time
      required:
        - playerId
        - tableId
        - handId
        - completedAt

    HandCompletedResponse:
      type: object
      properties:
        playerId:
          type: string
        playStreak:
          type: integer
        bestPlayStreak:
          type: integer
        streakBroken:
          type: boolean
        freezeConsumed:
          type: boolean
        alreadyPlayedToday:
          type: boolean
        milestone:
          $ref: "#/components/schemas/MilestoneReward"
      required:
        - playerId
        - playStreak
        - bestPlayStreak

    # ---------- Admin ----------
    GrantFreezesRequest:
      type: object
      properties:
        playerId:
          type: string
        count:
          type: integer
          minimum: 1
      required:
        - playerId
        - count

    GrantFreezesResponse:
      type: object
      properties:
        playerId:
          type: string
        freezesAvailable:
          type: integer
        granted:
          type: integer
      required:
        - playerId
        - freezesAvailable
        - granted

    AnalyticsTopPlayer:
      type: object
      properties:
        playerId:
          type: string
        displayName:
          type: string
        loginStreak:
          type: integer
        playStreak:
          type: integer
        score:
          type: integer

    AnalyticsResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        totalPlayers:
          type: integer
        engagement:
          type: object
          properties:
            dau:
              type: integer
            wau:
              type: integer
            mau:
              type: integer
        streaks:
          type: object
          properties:
            activeLoginStreaks:
              type: integer
            activePlayStreaks:
              type: integer
            avgLoginStreak:
              type: number
            avgPlayStreak:
              type: number
        retention:
          type: object
          properties:
            d1:
              type: integer
            d7:
              type: integer
            d30:
              type: integer
        tiers:
          type: object
          properties:
            bronze:
              type: integer
            silver:
              type: integer
            gold:
              type: integer
            platinum:
              type: integer
        topPlayers:
          type: array
          items:
            $ref: "#/components/schemas/AnalyticsTopPlayer"
        churnRisk:
          type: integer
      required:
        - timestamp
        - totalPlayers
        - engagement
        - streaks
        - retention
        - tiers
        - topPlayers
        - churnRisk

    TimeTravelRequest:
      type: object
      properties:
        date:
          type: string
          pattern: '^\d{4}-\d{2}-\d{2}$'
          example: "2026-04-01"
        reset:
          type: boolean

    ClearExclusionRequest:
      type: object
      properties:
        playerId:
          type: string
      required:
        - playerId

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

paths:
  # ──────────────────────────────────────────────
  # Health
  # ──────────────────────────────────────────────
  /api/v1/health:
    get:
      operationId: getHealth
      summary: Service health check
      tags: [Health]
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  # ──────────────────────────────────────────────
  # Player Streaks
  # ──────────────────────────────────────────────
  /api/v1/streaks/check-in:
    post:
      operationId: checkIn
      summary: Record a daily login check-in
      description: |
        Records the player's daily login. Idempotent -- calling multiple times
        on the same UTC day returns the current state without side effects.
        Handles streak continuation, freeze consumption on a single missed day,
        and streak reset on two or more missed days.
      tags: [Player Streaks]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Check-in recorded (or already recorded today)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckInResponse"
        "401":
          description: Missing or invalid auth token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/streaks:
    get:
      operationId: getStreaks
      summary: Get the player's current streak state
      description: |
        Returns login and play streak counts, best streaks, freeze balance,
        next milestones, combo status, and combo multiplier.
      tags: [Player Streaks]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Player streak state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreaksResponse"
        "401":
          description: Missing or invalid auth token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/streaks/leaderboard:
    get:
      operationId: getLeaderboard
      summary: Get the streak leaderboard
      description: |
        Returns the top 50 players ranked by streak score. Includes the
        requesting player's rank even if outside the top 50.
      tags: [Player Streaks]
      security:
        - BearerAuth: []
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [login, play, combined]
            default: combined
          description: Ranking type
      responses:
        "200":
          description: Leaderboard with player rank
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaderboardResponse"
        "401":
          description: Missing or invalid auth token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ──────────────────────────────────────────────
  # Calendar
  # ──────────────────────────────────────────────
  /api/v1/player/streaks/calendar:
    get:
      operationId: getCalendar
      summary: Get monthly activity calendar
      description: |
        Returns one entry per day for the requested month, showing activity
        type (login_only, played, freeze, streak_broken, none) and streak
        counts at each day. Powers the calendar heat-map UI.
      tags: [Calendar]
      security:
        - BearerAuth: []
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: string
            pattern: '^\d{4}-(0[1-9]|1[0-2])$'
            example: "2026-03"
          description: Month in YYYY-MM format
      responses:
        "200":
          description: Calendar data for the month
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarResponse"
        "400":
          description: Invalid or missing month parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "401":
          description: Missing or invalid auth token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ──────────────────────────────────────────────
  # Rewards
  # ──────────────────────────────────────────────
  /api/v1/player/streaks/rewards:
    get:
      operationId: getRewards
      summary: Get the player's reward history
      description: |
        Returns all milestone rewards earned by the player, sorted newest
        first.
      tags: [Rewards]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Reward history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RewardsResponse"
        "401":
          description: Missing or invalid auth token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ──────────────────────────────────────────────
  # Freezes
  # ──────────────────────────────────────────────
  /api/v1/player/streaks/freezes:
    get:
      operationId: getFreezes
      summary: Get freeze balance and history
      description: |
        Returns the player's current freeze balance, number of freezes used
        this month, and full freeze usage history.
      tags: [Freezes]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Freeze data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FreezesResponse"
        "401":
          description: Missing or invalid auth token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ──────────────────────────────────────────────
  # Missions
  # ──────────────────────────────────────────────
  /api/v1/missions:
    get:
      operationId: getMissions
      summary: Get today's missions
      description: |
        Returns the player's daily missions for today (UTC). Missions are
        generated deterministically on first access each day. Progress is
        recalculated from live data on every call.
      tags: [Missions]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Today's missions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MissionsResponse"
        "401":
          description: Missing or invalid auth token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/missions/{missionId}/claim:
    post:
      operationId: claimMission
      summary: Claim a completed mission reward
      description: |
        Claims the reward for a completed mission. Returns an error if the
        mission is not yet completed or has already been claimed.
      tags: [Missions]
      security:
        - BearerAuth: []
      parameters:
        - name: missionId
          in: path
          required: true
          schema:
            type: string
          description: The mission ID (e.g. `check_in-2026-03-23`)
      responses:
        "200":
          description: Reward claimed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MissionClaimResponse"
        "400":
          description: Mission not found, not completed, or already claimed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid auth token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ──────────────────────────────────────────────
  # Responsible Gaming
  # ──────────────────────────────────────────────
  /api/v1/player/responsible-gaming:
    get:
      operationId: getResponsibleGaming
      summary: Get responsible gaming settings
      description: |
        Returns the player's current session limit, daily hand limit,
        self-exclusion status, and reminder/cool-off flags.
      tags: [Responsible Gaming]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Current settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponsibleGamingSettings"
        "401":
          description: Missing or invalid auth token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    put:
      operationId: updateResponsibleGaming
      summary: Update responsible gaming settings
      description: |
        Partially updates the player's session limit, daily hand limit,
        and/or reminder preference. Only supplied fields are updated.
      tags: [Responsible Gaming]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResponsibleGamingUpdateRequest"
      responses:
        "200":
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponsibleGamingUpdateResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid auth token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/player/responsible-gaming/self-exclude:
    post:
      operationId: selfExclude
      summary: Self-exclude for a number of days
      description: |
        Applies a self-exclusion period (1-365 days). Intentionally difficult
        to undo -- contact support to reverse.
      tags: [Responsible Gaming]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SelfExcludeRequest"
      responses:
        "200":
          description: Self-exclusion applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SelfExcludeResponse"
        "400":
          description: Invalid exclusion period
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid auth token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ──────────────────────────────────────────────
  # Admin
  # ──────────────────────────────────────────────
  /api/v1/admin/freezes/grant:
    post:
      operationId: adminGrantFreezes
      summary: Grant freezes to a player
      description: |
        Adds additional streak freezes to a player's balance. No JWT auth
        required (admin endpoint -- MVP).
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GrantFreezesRequest"
      responses:
        "200":
          description: Freezes granted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GrantFreezesResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "404":
          description: Player not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/admin/analytics:
    get:
      operationId: getAnalytics
      summary: Get platform-wide analytics
      description: |
        Returns engagement metrics (DAU/WAU/MAU), streak statistics,
        retention cohorts, tier distribution, top players, and churn risk
        count.
      tags: [Admin]
      responses:
        "200":
          description: Analytics snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/admin/debug/clear-exclusion:
    post:
      operationId: adminClearExclusion
      summary: Clear a player's self-exclusion (debug)
      description: Dev/local only. Removes self-exclusion for the given player.
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClearExclusionRequest"
      responses:
        "200":
          description: Exclusion cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Missing playerId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/admin/debug/time-travel:
    post:
      operationId: adminTimeTravel
      summary: Override the server date (debug)
      description: |
        Dev/local only. Sets the server clock to a specific date for testing,
        or resets it to real time.
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TimeTravelRequest"
      responses:
        "200":
          description: Date set or reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid date format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    get:
      operationId: adminGetTimeTravel
      summary: Get current server date info (debug)
      tags: [Admin]
      responses:
        "200":
          description: Current time-travel status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ──────────────────────────────────────────────
  # Internal
  # ──────────────────────────────────────────────
  /internal/streaks/hand-completed:
    post:
      operationId: handCompleted
      summary: Record a completed poker hand
      description: |
        Called by the game processor when a player completes a hand. Updates
        the play streak independently from the login streak. No JWT auth
        required (internal service-to-service call).
      tags: [Internal]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HandCompletedRequest"
      responses:
        "200":
          description: Hand recorded and play streak updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HandCompletedResponse"
        "400":
          description: Missing or invalid fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
