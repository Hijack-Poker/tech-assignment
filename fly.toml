app = 'hijack-poker'
primary_region = 'sjc'

[build]

[env]
  PORT = '3030'
  NODE_ENV = 'production'
  # EventBridge/SQS/DynamoDB not needed for Unity client
  # They gracefully fail when not configured

[http_service]
  internal_port = 3030
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
